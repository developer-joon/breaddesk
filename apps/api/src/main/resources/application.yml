spring:
  application:
    name: breaddesk-api

  docker:
    compose:
      file: ../../docker-compose.yml
      lifecycle-management: start-and-stop   # 앱 종료 시 컨테이너도 정지

  datasource:
    url: jdbc:mysql://localhost:3306/breaddesk?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:breaddesk}
    password: ${DB_PASSWORD:breaddesk}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080

# BreadDesk custom config
breaddesk:
  llm:
    provider: ${LLM_PROVIDER:ollama}
    ollama:
      url: ${OLLAMA_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3.1:8b}
    openai:
      model: ${OPENAI_MODEL:gpt-4o}
    claude:
      model: ${CLAUDE_MODEL:claude-sonnet-4-5-20250514}
  embedding:
    provider: ${EMBEDDING_PROVIDER:local}
    local:
      model: all-MiniLM-L6-v2
  vector:
    provider: ${VECTOR_PROVIDER:pgvector}
  upload:
    path: ${UPLOAD_PATH:./uploads}
    max-file-size: 10485760  # 10MB
    max-files-per-entity: 5

logging:
  level:
    com.breadlab.breaddesk: DEBUG
    org.hibernate.SQL: WARN
