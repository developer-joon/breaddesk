spring:
  application:
    name: breaddesk-api

  docker:
    compose:
      enabled: false
      file: ../../docker-compose.yml
      lifecycle-management: start-and-stop   # 앱 종료 시 컨테이너도 정지

  datasource:
    url: jdbc:postgresql://localhost:5432/breaddesk
    username: ${DB_USERNAME:breaddesk}
    password: ${DB_PASSWORD:breaddesk}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024

# BreadDesk custom config
breaddesk:
  features:
    kanban-tasks: true       # 칸반/업무 관리 (기본 ON)
    internal-notes: true     # 내부 메모 (기본 ON)
    ai-assignment: false     # AI 담당자 추천 (기본 OFF, 칸반 의존)
    jira-integration: false  # Jira 연동 (기본 OFF, 추후 구현)
  sla:
    scheduler:
      enabled: true
      interval-ms: 60000
  llm:
    provider: ${LLM_PROVIDER:ollama}
    ollama:
      url: ${OLLAMA_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3.1:8b}
    openai:
      model: ${OPENAI_MODEL:gpt-4o}
    claude:
      model: ${CLAUDE_MODEL:claude-sonnet-4-5-20250514}
  embedding:
    provider: ${EMBEDDING_PROVIDER:openai}
    local:
      model: all-MiniLM-L6-v2
    openai:
      model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  vector:
    provider: ${VECTOR_PROVIDER:pgvector}
  webhook:
    default-token: ${WEBHOOK_DEFAULT_TOKEN:}
  upload:
    path: ${UPLOAD_PATH:./uploads}
    max-file-size: 10485760  # 10MB
    max-files-per-entity: 5

logging:
  level:
    com.breadlab.breaddesk: DEBUG
    org.hibernate.SQL: WARN

security:
  jwt:
    # 프로덕션에서는 반드시 환경변수 JWT_SECRET 설정 필요
    # 개발 환경 기본값: UUID 기반 랜덤 시크릿 (매 재시작 시 변경되어 토큰 무효화됨)
    secret: ${JWT_SECRET:dev-only-change-in-production-f8e7d6c5b4a39281}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
