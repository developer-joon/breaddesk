version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: breaddesk-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: breaddesk
      MYSQL_USER: breaddesk
      MYSQL_PASSWORD: breaddesk
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: breaddesk-redis
    ports:
      - "6379:6379"

  # Ollama (로컬 LLM) - GPU 있으면 deploy 섹션 활성화
  ollama:
    image: ollama/ollama:latest
    container_name: breaddesk-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # GPU 사용 시 아래 주석 해제
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # OpenClaw 노드 (브래드 연동)
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: breaddesk-openclaw
    volumes:
      - ./:/workspace    # 프로젝트 루트 마운트
    ports:
      - "3001:3000"       # OpenClaw 웹 (프론트와 충돌 방지)
    restart: unless-stopped

volumes:
  mysql-data:
  ollama-data:
