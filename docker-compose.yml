services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: breaddesk-postgres
    environment:
      POSTGRES_DB: breaddesk
      POSTGRES_USER: breaddesk
      POSTGRES_PASSWORD: breaddesk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Ollama (로컬 LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: breaddesk-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
