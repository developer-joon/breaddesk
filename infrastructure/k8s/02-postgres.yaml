apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: breaddesk-postgres-pvc
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: breaddesk-postgres
  namespace: openclaw
spec:
  selector:
    app: breaddesk-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: breaddesk-postgres
  namespace: openclaw
spec:
  serviceName: breaddesk-postgres
  replicas: 1
  selector:
    matchLabels:
      app: breaddesk-postgres
  template:
    metadata:
      labels:
        app: breaddesk-postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg17
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: breaddesk
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: breaddesk-secrets
              key: DB_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: breaddesk-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: breaddesk-postgres-pvc
