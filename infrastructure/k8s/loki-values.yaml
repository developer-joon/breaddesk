# Loki Helm Chart Values
# SingleBinary 모드로 경량화 (작은 클러스터 적합)

loki:
  commonConfig:
    replication_factor: 1
  
  storage:
    type: filesystem
  
  auth_enabled: false
  
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # 기본 스토리지 클래스 사용
  
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# 모니터링 비활성화 (불필요한 리소스 절약)
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# 테스트 비활성화
test:
  enabled: false

# 서비스 설정
service:
  type: ClusterIP
  port: 3100

# 네임스페이스 라벨 (Prometheus 스크래핑용, 선택사항)
podLabels:
  app: loki
  component: logging
