apiVersion: apps/v1
kind: Deployment
metadata:
  name: breaddesk-api
  namespace: breaddesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: breaddesk-api
  template:
    metadata:
      labels:
        app: breaddesk-api
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: breaddesk-api
        image: ghcr.io/developer-joon/breaddesk-api:latest
        ports:
        - containerPort: 8080
        env:
        # Spring Profile
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        # Database
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://breaddesk-postgres:5432/breaddesk
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: breaddesk-secrets
              key: DB_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: breaddesk-secrets
              key: DB_PASSWORD
        # Security
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: breaddesk-secrets
              key: JWT_SECRET
        # AI Provider
        - name: BREADDESK_AI_PROVIDER_URL
          value: "http://localhost:11434"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: breaddesk-api
  namespace: breaddesk
spec:
  selector:
    app: breaddesk-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
