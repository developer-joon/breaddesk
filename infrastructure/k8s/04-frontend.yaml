apiVersion: apps/v1
kind: Deployment
metadata:
  name: breaddesk-web
  namespace: breaddesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: breaddesk-web
  template:
    metadata:
      labels:
        app: breaddesk-web
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: breaddesk-web
        image: ghcr.io/developer-joon/breaddesk-web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: ""
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: breaddesk-web
  namespace: breaddesk
spec:
  selector:
    app: breaddesk-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
